<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="telemedicine_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>telemedicine_app</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #audio-unlock-overlay {
      display: none;
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 14px 26px;
      border-radius: 30px;
      font-size: 15px;
      font-family: -apple-system, sans-serif;
      z-index: 9999;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.35);
      white-space: nowrap;
      animation: pulse-btn 2s ease-in-out infinite;
    }
    #audio-unlock-overlay.show { display: block; }
    @keyframes pulse-btn {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }
  </style>
</head>
<body>
  <div id="audio-unlock-overlay">🔊 แตะที่นี่เพื่อเปิดเสียง</div>

  <script>
  // ============================================================
  // Architecture:
  //   Voice = Opus track (default Line/IG-grade quality)
  //   Heart sound = PCM DataChannel only (lossless, separate from Opus)
  //   No replaceTrack, no duplicate getUserMedia
  // ============================================================

  window._pcs = [];
  function _uniquePcs() { return Array.from(new Set(window._pcs || [])); }

  // Single PatchedPC — track PCs + intercept DataChannels
  (function () {
    var _OrigPC = window.RTCPeerConnection;
    function PatchedPC(config) {
      var pc = new _OrigPC(config);
      window._pcs.push(pc);
      var origClose = pc.close.bind(pc);
      pc.close = function () {
        window._pcs = window._pcs.filter(function (p) { return p !== pc; });
        origClose();
      };
      pc.addEventListener('connectionstatechange', function () {
        if (pc.connectionState === 'closed' || pc.connectionState === 'failed') {
          window._pcs = window._pcs.filter(function (p) { return p !== pc; });
        }
      });
      // Patient — intercept PCM DC creation (Dart calls createDataChannel)
      var _origCreate = pc.createDataChannel.bind(pc);
      pc.createDataChannel = function (label, opts) {
        var dc = _origCreate(label, opts);
        if (label === 'pcm-heart') {
          _pcmSendChannel = dc;
          console.log('[PCM] sender channel ready');
        }
        return dc;
      };
      // Doctor — intercept PCM DC reception
      pc.addEventListener('datachannel', function (event) {
        var dc = event.channel;
        if (dc.label === 'pcm-heart') {
          console.log('[PCM] receiver channel ready');
          window._startPcmPlayback(dc);
        }
      });
      return pc;
    }
    PatchedPC.prototype = _OrigPC.prototype;
    Object.assign(PatchedPC, _OrigPC);
    window.RTCPeerConnection = PatchedPC;
  })();

  // ============================================================
  // Opus playback (voice) — DIRECT <audio> element playback
  //   เล่นผ่าน element โดยตรง → WebRTC AEC3 เห็น reference signal → ตัด echo ได้
  //   CRITICAL: ต้อง mute LOCAL audio element (จาก self-renderer) เพื่อกัน loopback:
  //     Mic → local element → speaker → mic → loop → echo ก้อง
  //   วิธี: intercept getUserMedia จับ local stream ID → element ที่มี srcObject ตรงนี้ = local → mute เสมอ
  // ============================================================
  var _opusMuted = false;
  var _localStreamIds = new Set();
  var _localTrackIds = new Set();       // track IDs — robust ต่อ flutter_webrtc wrapping MediaStream ใหม่
  var _localAudioTracks = new Set();    // tracked for Half-Duplex VAD auto-mute
  var _expanderActive = false;          // soft expander active → remote element muted, playback ผ่าน Web Audio

  // Intercept getUserMedia → track local stream + track IDs (เพื่อแยก local vs remote)
  (function () {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
    var _origGUM = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
    navigator.mediaDevices.getUserMedia = function (constraints) {
      return _origGUM(constraints).then(function (stream) {
        _localStreamIds.add(stream.id);
        stream.getTracks().forEach(function (t) { _localTrackIds.add(t.id); });
        stream.getAudioTracks().forEach(function (t) { _localAudioTracks.add(t); });
        console.log('[Mic] local stream tracked id=' + stream.id +
                    ' tracks=' + stream.getTracks().map(function(t){return t.kind+':'+t.id.slice(0,8);}).join(','));
        return stream;
      });
    };
  })();

  function _getMediaEls() {
    // Both <audio> และ <video> — flutter_webrtc web เล่น remote audio ผ่าน <video> ด้วย
    return [
      ...Array.from(document.querySelectorAll('audio')),
      ...Array.from(document.querySelectorAll('video')),
    ];
  }

  function _isLocalStreamEl(el) {
    if (!el.srcObject) return false;
    // 1. Direct: srcObject.id ตรงกับ getUserMedia stream
    if (_localStreamIds.has(el.srcObject.id)) return true;
    // 2. Fallback: flutter_webrtc อาจ wrap stream → stream id ไม่ตรง แต่ track id ยังคงเดิม
    try {
      var tracks = el.srcObject.getTracks();
      for (var i = 0; i < tracks.length; i++) {
        if (_localTrackIds.has(tracks[i].id)) return true;
      }
    } catch(_) {}
    return false;
  }

  function _applyMuteToElement(el) {
    if (!el || !el.srcObject) return;
    var isLocal = _isLocalStreamEl(el);
    // One-shot diagnostic log per element (debug local mute matching)
    if (!el.__hdLogged) {
      el.__hdLogged = true;
      var tracks = (function(){ try { return el.srcObject.getTracks().map(function(t){return t.kind+':'+t.id.slice(0,8);}).join(','); } catch(_){ return '?'; }})();
      console.log('[MediaEl] ' + el.tagName + ' srcObj=' + el.srcObject.id.slice(0,8) +
                  ' tracks=' + tracks + ' → ' + (isLocal ? 'LOCAL (muted)' : 'REMOTE (play)'));
    }
    // Local renderer = ALWAYS muted (prevent self-loopback: mic → local <video>/audio → speaker)
    if (isLocal) {
      if (el.muted !== true) el.muted = true;
      if (el.volume !== 0) el.volume = 0;
      return;
    }
    // Remote stream:
    //   - ถ้า expander active → element เสมอ muted (Web Audio handle playback) + opus mute ผ่าน expander gain
    //   - ถ้า expander ปิด → fallback ตามเดิม (el.muted = _opusMuted)
    if (_expanderActive) {
      if (el.muted !== true) el.muted = true;
      el.volume = 0;
    } else {
      el.muted = _opusMuted;
      el.volume = _opusMuted ? 0 : 1;
    }
    if (el.paused) {
      el.play().catch(function(){});   // เก็บ playing เพื่อให้ MediaStreamSource (expander) ดึง audio ได้
    }
  }

  // MutationObserver: catch new media elements + recheck after srcObject set
  // หมายเหตุ: ตอน element ถูกสร้างใหม่ srcObject อาจยังไม่ assign → _applyMuteToElement
  //          จะ skip; enforcement loop จะ catch ภายใน 250ms warmup window
  (function () {
    var observer = new MutationObserver(function () {
      _getMediaEls().forEach(_applyMuteToElement);
    });
    if (document.body) {
      observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['src'] });
    } else {
      document.addEventListener('DOMContentLoaded', function () {
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['src'] });
      });
    }
  })();

  // Adaptive enforcement loop: 250ms × 20 cycles (5s warmup) → 800ms steady
  // Warmup เร็วเพื่อ catch local stream ก่อน mobile user ได้ยินเสียงตัวเอง
  var _enforceCount = 0;
  function _enforceLoop() {
    _getMediaEls().forEach(_applyMuteToElement);
    _enforceCount++;
    var nextDelay = _enforceCount < 20 ? 250 : 800;
    setTimeout(_enforceLoop, nextDelay);
  }
  _enforceLoop();

  window.setOpusMuted = function (muted) {
    _opusMuted = muted;
    // ถ้า expander active → ปรับ output gain ของ Web Audio chain (element ยัง muted เสมอ)
    if (_expanderActive && _expOutputGain) {
      _expOutputGain.gain.value = muted ? 0 : 1;
    }
    _getMediaEls().forEach(_applyMuteToElement);
    console.log('[Opus] muted=' + muted + (_expanderActive ? ' (via expander gain)' : ' (via element)'));
  };

  // ============================================================
  // SimAudio — Heart sound transmission (PCM DataChannel only)
  //   Single AudioContext: BufferSource → AudioWorklet → DataChannel
  //   No MediaStreamDestination, no replaceTrack, no duplicate getUserMedia
  // ============================================================
  var _simCtx = null;
  var _simSrc = null;
  var _simBufferCache = {}; // url → AudioBuffer (decoded once)
  var _pcmSendChannel = null;

  // 40ms chunks @ 16kHz = 640 samples → 1280 bytes/chunk (Int16) = 256 kbps
  // ลด bandwidth จาก 768 kbps (48kHz) → 256 kbps (16kHz) สำหรับ 4G friendly
  var _pcmWorkletSrc = [
    "class StethCapture extends AudioWorkletProcessor {",
    "  constructor() { super(); this._buf = new Float32Array(640); this._pos = 0; }",
    "  process(inputs) {",
    "    var ch = inputs[0] && inputs[0][0];",
    "    if (!ch) return true;",
    "    for (var i = 0; i < ch.length; i++) {",
    "      this._buf[this._pos++] = ch[i];",
    "      if (this._pos === 640) {",   // 40ms @ 16kHz
    "        this.port.postMessage(this._buf.buffer, [this._buf.buffer]);",
    "        this._buf = new Float32Array(640); this._pos = 0;",
    "      }",
    "    }",
    "    return true;",
    "  }",
    "}",
    "registerProcessor('steth-capture', StethCapture);"
  ].join('\n');

  // Playback worklet — ring buffer pull-mode
  // กำจัด BufferSource scheduling drift บน Android: audio thread pull samples on-demand
  // จาก ring (32000 samples = 2s @ 16kHz). Underrun = output silence, ไม่ crash.
  // Pre-fill threshold (320ms PC / 640ms Android) ก่อนเริ่มเล่น → buffer headroom
  var _pcmPlaybackWorkletSrc = [
    "class StethPlayback extends AudioWorkletProcessor {",
    "  constructor() {",
    "    super();",
    "    this._size = 32000;",
    "    this._ring = new Float32Array(this._size);",
    "    this._write = 0; this._read = 0; this._available = 0;",
    "    this._minStart = 5120;",   // default 320ms prefill
    "    this._playing = false;",
    "    this._underruns = 0;",
    "    this.port.onmessage = (e) => {",
    "      var d = e.data;",
    "      if (d && d.cmd === 'config') { this._minStart = d.prefill; return; }",
    "      if (d && d.cmd === 'reset') {",
    "        this._write = 0; this._read = 0; this._available = 0;",
    "        this._playing = false; return;",
    "      }",
    "      var chunk = d;",
    "      for (var i = 0; i < chunk.length; i++) {",
    "        this._ring[this._write] = chunk[i];",
    "        this._write = (this._write + 1) % this._size;",
    "      }",
    "      this._available = Math.min(this._available + chunk.length, this._size);",
    "    };",
    "  }",
    "  process(inputs, outputs) {",
    "    var out = outputs[0][0];",
    "    if (!out) return true;",
    "    if (!this._playing) {",
    "      if (this._available >= this._minStart) this._playing = true;",
    "      else { out.fill(0); return true; }",
    "    }",
    "    for (var i = 0; i < out.length; i++) {",
    "      if (this._available > 0) {",
    "        out[i] = this._ring[this._read];",
    "        this._read = (this._read + 1) % this._size;",
    "        this._available--;",
    "      } else {",
    "        out[i] = 0;",
    "        this._playing = false;",   // wait for refill
    "        this._underruns++;",
    "        if (this._underruns % 50 === 1) {",
    "          this.port.postMessage({ event: 'underrun', count: this._underruns });",
    "        }",
    "      }",
    "    }",
    "    return true;",
    "  }",
    "}",
    "registerProcessor('steth-playback', StethPlayback);"
  ].join('\n');

  // Quantize Float32 [-1,1] → Int16 LE → 768 kbps (half of Float32)
  function _floatToInt16(f32) {
    var i16 = new Int16Array(f32.length);
    for (var i = 0; i < f32.length; i++) {
      var s = Math.max(-1, Math.min(1, f32[i]));
      i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return i16;
  }

  window.startSimAudio = async function (assetPath) {
    try {
      // Stop previous if any
      if (_simSrc) { try { _simSrc.stop(); } catch(_){} _simSrc = null; }
      if (_simCtx) { try { await _simCtx.close(); } catch(_){} _simCtx = null; }

      // 16kHz — sufficient for heart sound (S1/S2 fundamentals < 200Hz, harmonics < 2kHz)
      // Browser auto-resamples WAV asset (48k) → 16k with high-quality anti-aliasing filter
      var ctx = new (window.AudioContext || window.webkitAudioContext)({
        sampleRate: 16000, latencyHint: 'interactive',
      });
      await ctx.resume();

      // Load worklet
      var blob = new Blob([_pcmWorkletSrc], { type: 'application/javascript' });
      var blobUrl = URL.createObjectURL(blob);
      await ctx.audioWorklet.addModule(blobUrl);
      URL.revokeObjectURL(blobUrl);

      // Decode + cache
      var url = new URL(assetPath, window.location.href).href;
      var audioBuffer = _simBufferCache[url];
      if (!audioBuffer) {
        var resp = await fetch(url);
        if (!resp.ok) throw new Error('Fetch failed: ' + resp.status + ' ' + url);
        var arr = await resp.arrayBuffer();
        audioBuffer = await ctx.decodeAudioData(arr);
        _simBufferCache[url] = audioBuffer;
      }

      // BufferSource → AudioWorklet → muted gain → destination
      // (worklet doesn't write outputs[] so destination output is silent)
      var src = ctx.createBufferSource();
      src.buffer = audioBuffer;
      src.loop = true;

      var pcmNode = new AudioWorkletNode(ctx, 'steth-capture');
      var _sendCount = 0;
      pcmNode.port.onmessage = function (e) {
        if (!_pcmSendChannel || _pcmSendChannel.readyState !== 'open') return;
        var f32 = new Float32Array(e.data);
        var i16 = _floatToInt16(f32);
        try {
          _pcmSendChannel.send(i16.buffer);
          _sendCount++;
          if (_sendCount === 1 || _sendCount % 500 === 0) {
            console.log('[PCM] send #' + _sendCount);
          }
        } catch (err) {
          console.error('[PCM] send error:', err);
        }
      };

      src.connect(pcmNode);
      // Safari requires graph→destination — use muted gain (no speaker leak)
      var muteGain = ctx.createGain();
      muteGain.gain.value = 0;
      pcmNode.connect(muteGain);
      muteGain.connect(ctx.destination);

      src.start();
      _simCtx = ctx;
      _simSrc = src;
      console.log('[SimAudio] started ' + assetPath);
    } catch (e) {
      console.error('[SimAudio] error:', e);
    }
  };

  window.stopSimAudio = async function () {
    try {
      if (_simSrc) { try { _simSrc.stop(); } catch(_){} _simSrc = null; }
      if (_simCtx) { try { await _simCtx.close(); } catch(_){} _simCtx = null; }
      console.log('[SimAudio] stopped');
    } catch (e) {
      console.error('[SimAudio] stop error:', e);
    }
  };

  // ============================================================
  // Live stethoscope mic — separate getUserMedia with filters OFF
  //   For real stethoscope held to mic — preserve low bass (20-200Hz)
  //   AEC/NS/AGC = exact:false → raw signal
  // ============================================================
  var _stethCtx = null;
  var _stethStream = null;

  window.startStethMic = async function () {
    try {
      // Stop any previous live mic
      if (_stethCtx) await window.stopStethMic();

      var stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: { exact: false },
          noiseSuppression: { exact: false },
          autoGainControl: { exact: false },
          googHighpassFilter: false,
          googNoiseSuppression: false,
          googAutoGainControl: false,
          googEchoCancellation: false,
          sampleRate: 16000,
          channelCount: 1,
        },
        video: false,
      });

      // 16kHz ctx — ถ้า mic ให้ 48k มา browser resample ลง 16k ให้ auto
      var ctx = new (window.AudioContext || window.webkitAudioContext)({
        sampleRate: 16000, latencyHint: 'interactive',
      });
      await ctx.resume();

      var blob = new Blob([_pcmWorkletSrc], { type: 'application/javascript' });
      var blobUrl = URL.createObjectURL(blob);
      await ctx.audioWorklet.addModule(blobUrl);
      URL.revokeObjectURL(blobUrl);

      var src = ctx.createMediaStreamSource(stream);
      var pcmNode = new AudioWorkletNode(ctx, 'steth-capture');
      var _sendCount = 0;
      pcmNode.port.onmessage = function (e) {
        if (!_pcmSendChannel || _pcmSendChannel.readyState !== 'open') return;
        var f32 = new Float32Array(e.data);
        var i16 = _floatToInt16(f32);
        try {
          _pcmSendChannel.send(i16.buffer);
          _sendCount++;
          if (_sendCount === 1 || _sendCount % 500 === 0) {
            console.log('[StethMic] send #' + _sendCount);
          }
        } catch (err) {
          console.error('[StethMic] send error:', err);
        }
      };

      src.connect(pcmNode);
      var muteGain = ctx.createGain();
      muteGain.gain.value = 0;
      pcmNode.connect(muteGain);
      muteGain.connect(ctx.destination);

      _stethCtx = ctx;
      _stethStream = stream;
      console.log('[StethMic] started (filters OFF, 48kHz)');
    } catch (e) {
      console.error('[StethMic] error:', e);
      throw e;
    }
  };

  window.stopStethMic = async function () {
    try {
      if (_stethCtx) { try { await _stethCtx.close(); } catch(_){} _stethCtx = null; }
      if (_stethStream) {
        _stethStream.getTracks().forEach(function (t) { t.stop(); });
        _stethStream = null;
      }
      console.log('[StethMic] stopped');
    } catch (e) {
      console.error('[StethMic] stop error:', e);
    }
  };

  // ============================================================
  // PCM Playback (Doctor) — DataChannel → AudioWorklet ring buffer
  //   audio thread pulls samples on-demand จาก ring (32000 = 2s @ 16kHz)
  //   ไม่มี BufferSource scheduling drift, ไม่มี per-chunk allocation
  //   Pre-fill: 320ms PC / 640ms Android ก่อนเริ่มเล่น
  //   Bass boost: lowshelf +6dB @ 200Hz (display aid, toggleable)
  // ============================================================
  var IS_ANDROID = /Android/i.test(navigator.userAgent);
  var _pcmPlayCtx = null;
  var _pcmMasterGain = null;
  var _pcmBassFilter = null;
  var _pcmWorkletNode = null;
  var _pcmWorkletReady = false;
  var _pcmPending = [];               // f32 chunks buffered during async worklet load
  var _pcmMuted = false;
  var _bassBoostEnabled = false;

  window._startPcmPlayback = async function (dc) {
    // Register DC listener FIRST — กัน race ระหว่าง await audioWorklet.addModule
    dc.binaryType = 'arraybuffer';
    var _msgCount = 0;
    dc.addEventListener('message', function (e) {
      _msgCount++;
      if (_msgCount === 1 || _msgCount % 500 === 0) console.log('[PCM] recv #' + _msgCount);
      var i16 = new Int16Array(e.data);
      var f32 = new Float32Array(i16.length);
      for (var i = 0; i < i16.length; i++) {
        f32[i] = i16[i] < 0 ? i16[i] / 0x8000 : i16[i] / 0x7FFF;
      }
      if (_pcmWorkletReady && _pcmWorkletNode) {
        _pcmWorkletNode.port.postMessage(f32);
      } else {
        _pcmPending.push(f32);
      }
    });
    dc.addEventListener('close', function () {
      if (_pcmWorkletNode) {
        try { _pcmWorkletNode.port.postMessage({ cmd: 'reset' }); } catch(_){}
      }
      _pcmPending = [];
    });

    if (_pcmPlayCtx && _pcmPlayCtx.state !== 'closed') {
      if (_pcmPlayCtx.state === 'suspended' && !_pcmMuted) _pcmPlayCtx.resume();
      return;
    }

    // Android: ไม่ใส่ latencyHint → browser pick safer default ลด underrun
    var ctxOpts = { sampleRate: 16000 };
    if (!IS_ANDROID) ctxOpts.latencyHint = 'interactive';
    _pcmPlayCtx = new (window.AudioContext || window.webkitAudioContext)(ctxOpts);
    console.log('[PCM] ctx sampleRate=' + _pcmPlayCtx.sampleRate +
                ' baseLatency=' + (_pcmPlayCtx.baseLatency || 'n/a') +
                ' state=' + _pcmPlayCtx.state +
                ' UA=' + (IS_ANDROID ? 'Android' : 'Other'));

    // Load playback worklet
    var blob = new Blob([_pcmPlaybackWorkletSrc], { type: 'application/javascript' });
    var blobUrl = URL.createObjectURL(blob);
    await _pcmPlayCtx.audioWorklet.addModule(blobUrl);
    URL.revokeObjectURL(blobUrl);

    _pcmWorkletNode = new AudioWorkletNode(_pcmPlayCtx, 'steth-playback');
    var prefillSamples = IS_ANDROID ? 10240 : 5120;   // 640ms vs 320ms @ 16kHz
    _pcmWorkletNode.port.postMessage({ cmd: 'config', prefill: prefillSamples });
    _pcmWorkletNode.port.onmessage = function (e) {
      if (e.data && e.data.event === 'underrun') {
        console.log('[PCM] underrun #' + e.data.count + ' (worklet ring empty)');
      }
    };

    _pcmMasterGain = _pcmPlayCtx.createGain();
    _pcmMasterGain.gain.value = _pcmMuted ? 0 : 1;
    _pcmBassFilter = _pcmPlayCtx.createBiquadFilter();
    _pcmBassFilter.type = 'lowshelf';
    _pcmBassFilter.frequency.value = 200;
    _pcmBassFilter.gain.value = _bassBoostEnabled ? 6 : 0;

    _pcmWorkletNode.connect(_pcmBassFilter);
    _pcmBassFilter.connect(_pcmMasterGain);
    if (!_pcmMuted) _pcmMasterGain.connect(_pcmPlayCtx.destination);

    _pcmWorkletReady = true;
    // Flush chunks ที่ buffered ตอน await worklet load
    var flushed = 0;
    while (_pcmPending.length > 0) {
      _pcmWorkletNode.port.postMessage(_pcmPending.shift());
      flushed++;
    }
    console.log('[PCM] worklet ready, prefill=' + (prefillSamples / 16) + 'ms' +
                ', flushed=' + flushed + ' pending chunks');

    if (_pcmPlayCtx.state === 'suspended' && !_pcmMuted) _pcmPlayCtx.resume();
  };

  window.setPcmMuted = function (muted) {
    _pcmMuted = muted;
    if (!_pcmMasterGain || !_pcmPlayCtx) return;
    _pcmMasterGain.gain.value = muted ? 0 : 1;
    try {
      if (muted) {
        _pcmMasterGain.disconnect();
      } else {
        _pcmMasterGain.connect(_pcmPlayCtx.destination);
        _pcmPlayCtx.resume().catch(function(){});
      }
    } catch(e) {}
    console.log('[PCM] muted=' + muted);
  };

  window.setBassBoost = function (enabled) {
    _bassBoostEnabled = enabled;
    if (_pcmBassFilter) _pcmBassFilter.gain.value = enabled ? 6 : 0;
    console.log('[Bass] enabled=' + enabled);
  };

  // ============================================================
  // Half-Duplex VAD — walkie-talkie mode (anti acoustic feedback)
  //   monitor remote audio level → auto-mute local mic เมื่อ peer พูด
  //   threshold + hangover 300ms → ไม่ flicker
  //   touch เฉพาะ track ที่ HD เป็นคน mute (preserve manual mic mute)
  // ============================================================
  var _hdEnabled = false;
  var _hdCtx = null;
  var _hdAnalyser = null;
  var _hdInterval = null;
  var _hdRemoteEl = null;
  var _hdMutedTracks = new Set();        // tracks HD muted — only HD will unmute
  var _hdActive = false;                  // currently auto-muting?
  var _HD_THRESHOLD = 15;                 // 0-255 byte freq avg — speech > 12-18
  var _HD_HANGOVER_MS = 600;              // ครอบคลุม natural speech pause (syllable gap < 400ms)
  var _HD_POLL_MS = 50;
  var _hdLastLogMs = 0;                   // ratelimit logs — กัน console spam

  function _hdAttachRemote() {
    var remoteEl = _getMediaEls().find(function (el) {
      return el.srcObject && !_isLocalStreamEl(el);
    });
    if (!remoteEl) return false;
    _hdRemoteEl = remoteEl;
    _hdCtx = new (window.AudioContext || window.webkitAudioContext)();
    var src = _hdCtx.createMediaStreamSource(remoteEl.srcObject);
    _hdAnalyser = _hdCtx.createAnalyser();
    _hdAnalyser.fftSize = 256;
    _hdAnalyser.smoothingTimeConstant = 0.3;
    src.connect(_hdAnalyser);    // analyser only — no output
    console.log('[HalfDuplex] attached to remote element');
    return true;
  }

  function _hdSetAutoMute(shouldMute) {
    if (shouldMute === _hdActive) return;
    _hdActive = shouldMute;
    if (shouldMute) {
      _localAudioTracks.forEach(function (t) {
        if (t.enabled) {              // only mute tracks that are currently on
          t.enabled = false;
          _hdMutedTracks.add(t);
        }
      });
    } else {
      _hdMutedTracks.forEach(function (t) { t.enabled = true; });
      _hdMutedTracks.clear();
    }
    // Ratelimit log → at most 1 per second (กัน flicker spam)
    var now = Date.now();
    if (now - _hdLastLogMs > 1000) {
      _hdLastLogMs = now;
      console.log('[HalfDuplex] ' + (shouldMute ? 'mic muted (remote talking)' : 'mic unmuted'));
    }
  }

  window.setHalfDuplex = function (enabled) {
    if (enabled === _hdEnabled) return;
    _hdEnabled = enabled;

    if (enabled) {
      // Try attach now; if remote element not yet ready, retry every 500ms
      var attempts = 0;
      var tryAttach = function () {
        if (!_hdEnabled) return;
        if (_hdAttachRemote()) {
          _hdStartPoll();
        } else if (attempts++ < 20) {
          setTimeout(tryAttach, 500);
        } else {
          console.warn('[HalfDuplex] giving up — no remote element after 10s');
        }
      };
      tryAttach();
      console.log('[HalfDuplex] ENABLED');
    } else {
      _hdStopPoll();
      _hdSetAutoMute(false);              // restore any HD-muted tracks
      if (_hdCtx) { try { _hdCtx.close(); } catch(_){} _hdCtx = null; }
      _hdAnalyser = null;
      _hdRemoteEl = null;
      console.log('[HalfDuplex] DISABLED');
    }
  };

  function _hdStartPoll() {
    if (_hdInterval) return;
    var data = new Uint8Array(_hdAnalyser.frequencyBinCount);
    var lastVoice = 0;
    _hdInterval = setInterval(function () {
      if (!_hdEnabled || !_hdAnalyser) return;
      _hdAnalyser.getByteFrequencyData(data);
      var sum = 0;
      for (var i = 0; i < data.length; i++) sum += data[i];
      var avg = sum / data.length;
      var now = Date.now();
      if (avg > _HD_THRESHOLD) lastVoice = now;
      _hdSetAutoMute((now - lastVoice) < _HD_HANGOVER_MS);
    }, _HD_POLL_MS);
  }

  function _hdStopPoll() {
    if (_hdInterval) { clearInterval(_hdInterval); _hdInterval = null; }
  }

  // ============================================================
  // Soft Expander — receive-side echo suppression
  //   remote audio → AnalyserNode → GainNode (variable) → destination
  //   เสียงเบา (echo feedback ~-20dB) → gain ลด -20dB → -40dB รวม inaudible
  //   เสียงปกติ (B speech) → gain เต็ม → ไม่กระทบ conversation
  //   smooth attack 20ms (จับ onset) / release 150ms (no click)
  // ============================================================
  var _expCtx = null;
  var _expSrc = null;
  var _expAnalyser = null;
  var _expGain = null;             // expander gain (level-driven, attack/release smoothed)
  var _expOutputGain = null;       // separate gain for setOpusMuted control
  var _expRemoteEl = null;
  var _expInterval = null;
  var _expCurrentlyGated = false;  // ratelimited log state
  var _expLastLogMs = 0;
  var _EXP_THRESHOLD = 18;         // 0-255 byte freq avg — speech > 25, echo feedback < 15
  var _EXP_HIGH = 1.0;             // normal speech passes through
  var _EXP_LOW = 0.1;              // -20dB attenuation for low-level (echo feedback)
  var _EXP_ATTACK_TC = 0.020;      // setTargetAtTime time constant — 20ms attack
  var _EXP_RELEASE_TC = 0.150;     // 150ms release
  var _EXP_POLL_MS = 20;

  function _expAttachRemote() {
    var remoteEl = _getMediaEls().find(function (el) {
      return el.srcObject && !_isLocalStreamEl(el);
    });
    if (!remoteEl) return false;
    _expRemoteEl = remoteEl;
    _expCtx = new (window.AudioContext || window.webkitAudioContext)();
    _expSrc = _expCtx.createMediaStreamSource(remoteEl.srcObject);
    _expAnalyser = _expCtx.createAnalyser();
    _expAnalyser.fftSize = 256;
    _expAnalyser.smoothingTimeConstant = 0.5;
    _expGain = _expCtx.createGain();
    _expGain.gain.value = _EXP_HIGH;
    _expOutputGain = _expCtx.createGain();
    _expOutputGain.gain.value = _opusMuted ? 0 : 1;

    // chain: src → analyser → gain (level-driven) → outputGain (opus mute) → destination
    _expSrc.connect(_expAnalyser);
    _expAnalyser.connect(_expGain);
    _expGain.connect(_expOutputGain);
    _expOutputGain.connect(_expCtx.destination);

    // Now route playback through Web Audio → mute remote <audio> element
    _expandSetRemoteElsMuted(true);
    console.log('[Expander] attached to remote element (sampleRate=' + _expCtx.sampleRate + ')');
    return true;
  }

  function _expandSetRemoteElsMuted(muted) {
    _getMediaEls().forEach(function (el) {
      if (el.srcObject && !_isLocalStreamEl(el)) {
        el.muted = muted;
        if (muted) el.volume = 0;
        if (el.paused) el.play().catch(function(){});
      }
    });
  }

  function _expStartPoll() {
    if (_expInterval) return;
    var data = new Uint8Array(_expAnalyser.frequencyBinCount);
    _expInterval = setInterval(function () {
      if (!_expanderActive || !_expAnalyser) return;
      _expAnalyser.getByteFrequencyData(data);
      var sum = 0;
      for (var i = 0; i < data.length; i++) sum += data[i];
      var avg = sum / data.length;
      var aboveThreshold = avg > _EXP_THRESHOLD;
      var target = aboveThreshold ? _EXP_HIGH : _EXP_LOW;
      var tc = (target > _expGain.gain.value) ? _EXP_ATTACK_TC : _EXP_RELEASE_TC;
      _expGain.gain.setTargetAtTime(target, _expCtx.currentTime, tc / 3);

      // ratelimit log on state changes
      var gated = !aboveThreshold;
      if (gated !== _expCurrentlyGated) {
        _expCurrentlyGated = gated;
        var now = Date.now();
        if (now - _expLastLogMs > 1000) {
          _expLastLogMs = now;
          console.log('[Expander] ' + (gated ? 'gated (low level, suppressing echo)' : 'open (speech detected)') + ' avg=' + avg.toFixed(0));
        }
      }
    }, _EXP_POLL_MS);
  }

  window.enableSoftExpander = function () {
    if (_expanderActive) return;
    _expanderActive = true;
    var attempts = 0;
    var tryAttach = function () {
      if (!_expanderActive) return;
      if (_expAttachRemote()) {
        _expStartPoll();
      } else if (attempts++ < 20) {
        setTimeout(tryAttach, 500);
      } else {
        console.warn('[Expander] giving up — no remote element after 10s');
        _expanderActive = false;
      }
    };
    tryAttach();
    console.log('[Expander] ENABLED');
  };

  window.disableSoftExpander = function () {
    if (!_expanderActive) return;
    _expanderActive = false;
    if (_expInterval) { clearInterval(_expInterval); _expInterval = null; }
    // Restore element playback (no Web Audio routing anymore)
    _expandSetRemoteElsMuted(_opusMuted);
    if (_expCtx) { try { _expCtx.close(); } catch(_){} }
    _expCtx = null; _expSrc = null; _expAnalyser = null;
    _expGain = null; _expOutputGain = null; _expRemoteEl = null;
    _expCurrentlyGated = false;
    console.log('[Expander] DISABLED');
  };

  // ============================================================
  // Recording — MediaRecorder บน remote audio (Doctor side)
  //   capture เสียงทุก channel ที่ doctor ฟังอยู่ (ทั้ง Opus + อาจรวม PCM
  //   ผ่าน Web Audio destination — แต่ MediaRecorder บน MediaStream ของ
  //   receiver จะได้เฉพาะ Opus track ของ patient).
  //   Return: blob URL (memory only — refresh เพจแล้วหาย)
  // ============================================================
  var _mediaRecorder = null;
  var _recChunks = [];

  window.startRecording = async function () {
    try {
      if (_mediaRecorder) { try { _mediaRecorder.stop(); } catch(_){} }
      // Collect all remote audio tracks (heart sound carried via PCM DC ไม่อยู่ใน MediaStream
      //  — แต่เสียง Opus จาก patient ใช้ได้สำหรับ voice; ส่วน heart sound ผ่าน PCM
      //  ต้องบันทึกฝั่ง doctor ผ่าน _pcmPlayCtx destination แยก — phase นี้บันทึก Opus ก่อน)
      var stream = new MediaStream();
      _uniquePcs().forEach(function (pc) {
        pc.getReceivers().forEach(function (r) {
          if (r.track && r.track.kind === 'audio') stream.addTrack(r.track);
        });
      });
      if (stream.getAudioTracks().length === 0) {
        throw new Error('ไม่พบเสียงสำหรับบันทึก');
      }
      var mime = 'audio/webm;codecs=opus';
      if (!MediaRecorder.isTypeSupported(mime)) mime = 'audio/webm';
      _recChunks = [];
      _mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
      _mediaRecorder.ondataavailable = function (e) {
        if (e.data && e.data.size > 0) _recChunks.push(e.data);
      };
      _mediaRecorder.start(250); // chunk every 250ms
      console.log('[Rec] started mime=' + mime);
    } catch (e) {
      console.error('[Rec] start error:', e);
      throw e;
    }
  };

  window.stopRecording = function () {
    return new Promise(function (resolve, reject) {
      if (!_mediaRecorder) { resolve(''); return; }
      _mediaRecorder.onstop = function () {
        try {
          var blob = new Blob(_recChunks, { type: _mediaRecorder.mimeType });
          var url = URL.createObjectURL(blob);
          _recChunks = [];
          _mediaRecorder = null;
          console.log('[Rec] stopped, blob size=' + blob.size);
          resolve(url);
        } catch (e) {
          reject(e);
        }
      };
      try { _mediaRecorder.stop(); } catch (e) { reject(e); }
    });
  };

  // ============================================================
  // iOS audio unlock — required user gesture
  // ============================================================
  var _audioUnlocked = false;
  function unlockAudio() {
    if (_audioUnlocked) return;
    _audioUnlocked = true;
    try {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) new Ctx().resume();
    } catch(e) {}
    _getMediaEls().forEach(function (el) {
      _applyMuteToElement(el);
      if (el.srcObject) el.play().catch(function(){});
    });
    var el = document.getElementById('audio-unlock-overlay');
    if (el) { el.style.opacity = '0'; setTimeout(function(){ el.classList.remove('show'); }, 300); }
  }

  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    setTimeout(function () {
      var el = document.getElementById('audio-unlock-overlay');
      if (el) el.classList.add('show');
    }, 3000);
  }

  document.getElementById('audio-unlock-overlay').addEventListener('click', function(e) {
    e.stopPropagation(); unlockAudio();
  });
  document.addEventListener('touchstart', unlockAudio, { passive: true });
  document.addEventListener('click', unlockAudio);

  new MutationObserver(function () {
    if (!_audioUnlocked) return;
    _getMediaEls().forEach(function (el) {
      if (el.srcObject && el.paused) el.play().catch(function(){});
    });
  }).observe(document.body, { childList: true, subtree: true, attributes: true });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
