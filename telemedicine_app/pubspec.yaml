name: telemedicine_app
description: "ระบบ telemedicine video call (clean base — heart sound feature to be rebuilt)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC native binding
  flutter_webrtc: ^0.12.0

  # Firebase Firestore — signaling
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0

  # Runtime camera/mic permission
  permission_handler: ^11.0.0

  # State management
  provider: ^6.0.0

  # AudioSession config (iOS/Android) ก่อน WebRTC
  audio_session: ^0.1.21

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  # Heart sound assets — kept for Phase 3 rebuild (not used in current clean base)
  assets:
    - assets/heart_sounds/
